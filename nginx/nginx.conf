# =============================================================
# NGINX - Balanceador de carga + servidor de archivos estaticos
# =============================================================
# El usuario SOLO accede a http://localhost. NGINX es el unico
# punto de entrada: sirve el frontend estatico y reenvia /api/
# hacia los tres nodos de la aplicacion usando balanceo por pesos.
#
# Pesos elegidos (ejemplo del enunciado), documentados aqui como
# criterio tecnico de referencia para la practica academica:
#   app-node-1 -> weight=5  (nodo principal / mayor capacidad asumida)
#   app-node-2 -> weight=3  (nodo secundario)
#   app-node-3 -> weight=2  (nodo de menor capacidad asumida)
#
# Con esta proporcion, de cada 10 solicitudes NGINX enviara en
# promedio 5 al nodo 1, 3 al nodo 2 y 2 al nodo 3.
# =============================================================

upstream app_cluster {
    # Resolucion de nombres de contenedores Docker via la red interna
    # definida en docker-compose.yml (service discovery de Docker DNS).
    server app-node-1:3000 weight=5;
    server app-node-2:3000 weight=3;
    server app-node-3:3000 weight=2;
}

server {
    listen 80;
    server_name localhost;

    # ---------------------------------------------------------
    # Frontend estatico (HTML / CSS / JS vanilla)
    # ---------------------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------------------------------------------------------
    # API -> balanceada hacia los 3 nodos de la aplicacion
    # ---------------------------------------------------------
    location /api/ {
        proxy_pass http://app_cluster;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Endpoint rapido para comprobar que NGINX esta arriba
    location /nginx-health {
        access_log off;
        return 200 "nginx-ok\n";
        add_header Content-Type text/plain;
    }
}
