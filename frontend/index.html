<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Iniciar sesion | Mesa de Entregas</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="body--login">

  <!-- Pagina de LOGIN. Al autenticarse, el navegador navega de verdad
       hacia tasks.html o teacher.html (segun el rol) -->
  <main class="login-page">

    <section class="login-page__visual" style="background-image: url('img/login-hero.jpg');">
      <p class="login-page__slogan">
        <span class="login-page__slogan-script">La Poli</span>
        <span class="login-page__slogan-bold">del<br />MAÑANA</span>
        <span class="login-page__slogan-script login-page__slogan-script--sm">hoy</span>
      </p>
    </section>

    <section class="login-page__panel">
      <div class="login-panel">
        <img class="login-panel__logo" src="img/logo-epn.png" alt="Escudo EPN" width="220" height="90" />

        <form id="loginForm" class="login-panel__form" novalidate>
          <label class="field field--plain">
            <span class="field__label field__label--sr">Correo institucional</span>
            <input type="email" id="loginEmail" class="field__input field__input--plain" placeholder="Username" required autocomplete="username" />
          </label>
          <label class="field field--plain">
            <span class="field__label field__label--sr">Contrasena</span>
            <input type="password" id="loginPassword" class="field__input field__input--plain" placeholder="Password" required autocomplete="current-password" />
          </label>

          <label class="login-panel__remember">
            <input type="checkbox" id="rememberUsername" />
            <span>Remember username</span>
          </label>

          <div id="loginMessage" class="alert" hidden></div>

          <button type="submit" class="btn btn--login btn--block">Log in</button>
        </form>
      </div>
    </section>

  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
